<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DYLAN_GROW // SOLAR_FLUX_PRO</title>
    <style>
        :root {
            --gold: #FFB612; --black: #000000; --panel: #111111;
            --ok: #00e676; --warn: #ff3b30; --steel: #1a1a1a;
            --muted: #888888;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            margin: 0; background: var(--black); color: #fff;
            font-family: ui-monospace, 'Cascadia Code', monospace;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { 
            padding: 12px; border-bottom: 2px solid var(--gold); 
            display: flex; justify-content: space-between; align-items: baseline;
            background: #000;
        }
        .logo { font-weight: 900; color: var(--gold); letter-spacing: 2px; font-size: 1rem; }
        
        main { flex: 1; overflow-y: auto; padding: 15px; position: relative; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Compass View */
        .compass-wrap { width: 240px; height: 240px; margin: 0 auto; position: relative; }
        .needle { transition: transform 0.1s linear; }

        /* Stats & Cards */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stat { background: var(--steel); padding: 12px; border: 1px solid #222; border-radius: 4px; }
        .label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
        .val { font-size: 1.1rem; font-weight: 900; color: var(--gold); }
        .card { background: var(--panel); border: 1px solid #222; border-left: 4px solid var(--gold); padding: 15px; margin: 15px 0; }
        
        /* Controls */
        input[type=range] { width: 100%; accent-color: var(--gold); height: 40px; margin: 10px 0; }
        .btn { 
            background: var(--gold); color: #000; border: none; width: 100%; 
            padding: 18px; font-weight: 900; text-transform: uppercase; border-radius: 4px; margin-bottom: 10px;
        }
        .btn-unlock { background: #fff; color: #000; margin-bottom: 20px; }

        /* Bottom Nav */
        nav { display: flex; background: #0a0a0a; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 15px; text-align: center; font-size: 0.65rem; color: #555; font-weight: bold; }
        .nav-item.active { color: var(--gold); border-top: 2px solid var(--gold); background: #111; }
    </style>
</head>
<body>

<header>
    <div class="logo">STEEL_FLUX 2.0</div>
    <div id="sensor-status" style="font-size:0.6rem; color:var(--warn)">SENSORS_LOCKED</div>
</header>

<main>
    <div id="unlock-screen">
        <div class="card" style="text-align:center">
            <h3 style="color:var(--gold)">FIELD READY?</h3>
            <p style="font-size:0.8rem; color:var(--muted)">Tap to unlock Audio & Compass sensors for NC Field Use.</p>
            <button class="btn btn-unlock" id="btn-start">ACTIVATE SYSTEM</button>
        </div>
    </div>

    <div id="tracker" class="tab-content active">
        <div class="compass-wrap">
            <svg viewBox="0 0 100 100" width="100%">
                <circle cx="50" cy="50" r="48" fill="none" stroke="#222" stroke-width="0.5"/>
                <g id="sunNeedle" class="needle"><line x1="50" y1="50" x2="50" y2="10" stroke="var(--gold)" stroke-width="3"/><circle cx="50" cy="8" r="3" fill="var(--gold)"/></g>
                <g id="headingNeedle" class="needle"><path d="M50,12 L46,25 L54,25 Z" fill="#fff" /><line x1="50" y1="50" x2="50" y2="15" stroke="#fff" stroke-width="1"/></g>
            </svg>
        </div>
        <div class="grid">
            <div class="stat"><div class="label">Azimuth</div><div class="val" id="az-val">000°</div></div>
            <div class="stat"><div class="label">Tilt</div><div class="val" id="tilt-val">0.0°</div></div>
        </div>
        <div class="card">
            <div class="label">Array Watts: <span id="watt-display" style="color:#fff">800W</span></div>
            <input type="range" id="watt-slider" min="100" max="5000" step="50" value="800">
        </div>
        <button class="btn" onclick="logSite()">Save Reading</button>
    </div>

    <div id="codes" class="tab-content">
        <div class="card">
            <h3 style="color:var(--gold)">NC FIELD SPECS</h3>
            <p class="label">Torque: 100-120 in-lbs (Rails)</p>
            <p class="label">NC Declination: -9.1° (True N)</p>
            <p class="label">Rapid Shutdown: 30s / 30V limit</p>
        </div>
    </div>
</main>

<nav>
    <div class="nav-item active" onclick="switchTab('tracker')">TRACKER</div>
    <div class="nav-item" onclick="switchTab('codes')">CODES</div>
</nav>

<script>
    let state = { heading: 0, tilt: 0, watts: 800, sunAz: 180 };
    let audioCtx;

    // 1. Tab Switcher Fix
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // 2. Audio & Sensor Unlock (Crucial for Mobile)
    document.getElementById('btn-start').onclick = async function() {
        // Init Audio
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume();
        
        // Request Compass/Motion (iOS 13+)
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') startSensors();
        } else {
            startSensors();
        }
        
        document.getElementById('unlock-screen').style.display = 'none';
        document.getElementById('sensor-status').innerText = 'SYSTEM_LIVE';
        document.getElementById('sensor-status').style.color = 'var(--ok)';
        ping(880); // Success beep
    };

    function startSensors() {
        window.addEventListener('deviceorientation', (e) => {
            state.heading = e.webkitCompassHeading || (360 - e.alpha);
            state.tilt = Math.abs(e.beta);
            updateUI();
        });
    }

    function ping(freq) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = freq;
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function updateUI() {
        document.getElementById('headingNeedle').style.transform = `rotate(${state.heading}deg)`;
        document.getElementById('sunNeedle').style.transform = `rotate(${state.sunAz}deg)`;
        document.getElementById('az-val').innerText = Math.round(state.heading) + '°';
        document.getElementById('tilt-val').innerText = state.tilt.toFixed(1) + '°';
        
        // Sound alignment feedback
        let diff = Math.abs(state.sunAz - state.heading);
        if(diff < 5 && Math.random() > 0.95) ping(1200); 
    }

    document.getElementById('watt-slider').oninput = (e) => {
        state.watts = e.target.value;
        document.getElementById('watt-display').innerText = state.watts + 'W';
    };

    function logSite() {
        ping(440);
        if ('vibrate' in navigator) navigator.vibrate(100);
        alert(`LOGGED: ${state.watts}W @ ${state.tilt.toFixed(1)}°`);
    }
</script>
</body>
</html>
