<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DYLAN_GROW // SOLAR_FLUX_PRO</title>
    <style>
        :root {
            --gold: #FFB612; --black: #000000; --panel: #111111;
            --ok: #00e676; --warn: #ff3b30; --steel: #1a1a1a;
        }
        body {
            margin: 0; background: var(--black); color: #fff;
            font-family: 'Segoe UI', Roboto, Monaco, monospace;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { 
            padding: 12px; border-bottom: 2px solid var(--gold); 
            display: flex; justify-content: space-between; align-items: baseline;
            background: linear-gradient(180deg, #151515, #000);
        }
        .logo { font-weight: 900; color: var(--gold); letter-spacing: 2px; font-size: 1.2rem; }
        .nc-badge { font-size: 0.6rem; border: 1px solid var(--gold); padding: 2px 5px; border-radius: 3px; }

        main { flex: 1; overflow-y: auto; padding: 15px; }
        .card { 
            background: var(--panel); border-left: 4px solid var(--gold);
            padding: 15px; margin-bottom: 15px; border-radius: 2px;
        }
        
        /* Compass View */
        .compass-wrap { width: 280px; height: 280px; margin: 0 auto; position: relative; }
        .needle { transition: transform 0.1s linear; }

        /* Tech Metrics */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { background: var(--steel); padding: 10px; border: 1px solid #333; }
        .label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .val { font-size: 1.1rem; font-weight: 800; color: var(--gold); }

        /* Glove-Ready Controls */
        .slider-group { margin: 20px 0; }
        input[type=range] { width: 100%; accent-color: var(--gold); height: 30px; }
        .btn { 
            background: var(--gold); color: #000; border: none; width: 100%; 
            padding: 18px; font-weight: 900; text-transform: uppercase; margin-top: 10px;
        }

        /* Nav */
        nav { display: flex; background: #0a0a0a; border-top: 1px solid #333; }
        .nav-item { flex: 1; padding: 15px; text-align: center; font-size: 0.7rem; font-weight: bold; color: #555; cursor: pointer; }
        .nav-item.active { color: var(--gold); border-top: 3px solid var(--gold); background: #111; }

        /* NC Specific Alerts */
        .alert { padding: 10px; font-size: 0.8rem; background: #300; border: 1px solid var(--warn); display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">STEEL_FLUX <span style="color:#fff">2.0</span></div>
    <div class="nc-badge">NC_TECH_OS</div>
</header>

<main id="app">
    <div id="safety-alert" class="alert">⚠️ FALL HAZARD: PITCH > 6/12. USE HARNESS.</div>

    <div class="compass-wrap">
        <svg viewBox="0 0 100 100" width="100%">
            <circle cx="50" cy="50" r="48" fill="none" stroke="#222" stroke-width="0.5"/>
            <g id="sunNeedle" class="needle">
                <line x1="50" y1="50" x2="50" y2="10" stroke="var(--gold)" stroke-width="3" />
                <circle cx="50" cy="8" r="4" fill="var(--gold)" />
            </g>
            <g id="headingNeedle" class="needle">
                <path d="M50,15 L46,25 L54,25 Z" fill="#fff" />
                <line x1="50" y1="50" x2="50" y2="15" stroke="#fff" stroke-width="1"/>
            </g>
        </svg>
    </div>

    <div class="grid">
        <div class="stat"><div class="label">True Azimuth</div><div class="val" id="az-val">000°</div></div>
        <div class="stat"><div class="label">Tilt (Pitch)</div><div class="val" id="tilt-val">0.0°</div></div>
        <div class="stat"><div class="label">Efficiency</div><div class="val" id="eff-val">0%</div></div>
        <div class="stat"><div class="label">Est. Output</div><div class="val" id="out-val">0.0kW</div></div>
    </div>

    <div class="card">
        <div class="label">System Size (Watts)</div>
        <input type="range" id="watt-slider" min="1000" max="100000" step="500" value="8000">
        <div id="watt-display" style="text-align:right; font-weight:bold;">8000 W</div>
    </div>

    <button class="btn" id="log-btn">Record As-Built Reading</button>
</main>

<nav>
    <div class="nav-item active">TRACKER</div>
    <div class="nav-item">NC_CODES</div>
    <div class="nav-item">STRINGS</div>
    <div class="nav-item">REPORTS</div>
</nav>

<script>
    const CONFIG = {
        NC_RATE: 0.1368,
        DECLINATION: -9.1, // NC Avg
        TEMP_COEFF: -0.0035, // -0.35% per C
        STC_TEMP: 25
    };

    let state = {
        heading: 0,
        tilt: 0,
        watts: 8000,
        sunAz: 180, // Default South
        sunAlt: 45
    };

    // Audio Engine
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, vol) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = freq;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // Main Update Loop
    function update() {
        // 1. Compass Rotation (True North Adjust)
        const trueHeading = (state.heading + CONFIG.DECLINATION + 360) % 360;
        document.getElementById('headingNeedle').style.transform = `rotate(${state.heading}deg)`;
        document.getElementById('sunNeedle').style.transform = `rotate(${state.sunAz}deg)`;

        // 2. Alignment Math
        let diff = Math.abs(state.sunAz - trueHeading);
        if (diff > 180) diff = 360 - diff;
        
        const azVal = document.getElementById('az-val');
        azVal.innerText = Math.round(trueHeading).toString().padStart(3, '0') + '°';

        // 3. Efficiency & Output (The "Beast" Math)
        const radTilt = state.tilt * Math.PI / 180;
        const radSunAlt = state.sunAlt * Math.PI / 180;
        // Cosine loss for tilt + sine for sun elevation
        const cosFactor = Math.cos(radTilt - (Math.PI/2 - radSunAlt));
        const efficiency = Math.max(0, cosFactor);
        
        document.getElementById('eff-val').innerText = Math.round(efficiency * 100) + '%';
        document.getElementById('out-val').innerText = ((state.watts * efficiency) / 1000).toFixed(2) + 'kW';

        // 4. Safety Alerts
        document.getElementById('safety-alert').style.display = state.tilt > 26 ? 'block' : 'none';

        // 5. Geiger Audio Feedback
        if (diff < 15) {
            const interval = diff * 20; // Faster pings when closer
            // Logic handled by a separate interval in production
        }
    }

    // Input Listeners
    window.addEventListener('deviceorientation', (e) => {
        state.heading = e.webkitCompassHeading || (360 - e.alpha);
        state.tilt = Math.abs(e.beta);
        document.getElementById('tilt-val').innerText = state.tilt.toFixed(1) + '°';
        update();
    });

    document.getElementById('watt-slider').oninput = (e) => {
        state.watts = e.target.value;
        document.getElementById('watt-display').innerText = state.watts + ' W';
        update();
    };

    document.getElementById('log-btn').onclick = () => {
        playBeep(880, 0.1);
        if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]);
        console.log("Reading Logged for NC Site", state);
    };

    // Auto-lock wake lock if supported
    if ('wakeLock' in navigator) navigator.wakeLock.request('screen');
</script>
</body>
</html>
