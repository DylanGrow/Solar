<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DYLAN_GROW // STEEL_FLUX_PRO</title>
    <style>
        :root {
            --gold: #FFB612;
            --bg: #000000;
            --panel: #0d0d0d;
            --border: #222222;
            --fg: #ffffff;
            --muted: #666666;
        }

        body {
            margin: 0; background: var(--bg); color: var(--fg);
            font-family: ui-monospace, 'Cascadia Code', monospace;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px; border-bottom: 2px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center;
            background: #111;
        }
        .logo { font-weight: 900; color: var(--gold); letter-spacing: 2px; }

        main { flex: 1; overflow-y: auto; padding: 20px; position: relative; }

        .compass-wrap { width: 280px; height: 280px; margin: 0 auto 20px; position: relative; }
        /* FIXED: transform-origin ensures SVGs spin from their exact center */
        .needle { transition: transform 0.1s linear; transform-origin: 50px 50px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 4px; }
        .label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
        .val { font-size: 22px; font-weight: 900; color: var(--gold); }

        .slider-card { background: #111; padding: 20px; border-left: 4px solid var(--gold); margin: 20px 0; }
        input[type=range] { width: 100%; accent-color: var(--gold); cursor: pointer; }

        .btn { 
            background: var(--gold); color: #000; border: none; width: 100%; 
            padding: 20px; font-weight: 900; text-transform: uppercase; border-radius: 4px;
        }
        .btn:active { background: #fff; }

        #boot-screen { 
            position: absolute; inset: 0; background: #000; z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body>

<div id="boot-screen">
    <h1 style="color:var(--gold); letter-spacing:4px;">STEEL_FLUX v2.0</h1>
    <p style="color:var(--muted); font-size:12px;">PRO SOLAR_FIELD_ENGINE // NC_REGION</p>
    <button class="btn" id="start-sys" style="width:200px; margin-top:30px;">START SYSTEM</button>
</div>

<header>
    <div class="logo">DYLAN_GROW</div>
    <div style="font-size:10px; color:var(--gold)" id="sys-status">SYS_STBY</div>
</header>

<main>
    <div class="compass-wrap">
        <svg viewBox="0 0 100 100" width="100%">
            <circle cx="50" cy="50" r="48" fill="none" stroke="#222" stroke-width="1"/>
            <g id="sunNeedle" class="needle"><line x1="50" y1="50" x2="50" y2="10" stroke="var(--gold)" stroke-width="3"/><circle cx="50" cy="8" r="3" fill="var(--gold)"/></g>
            <g id="phoneNeedle" class="needle"><path d="M50,12 L46,25 L54,25 Z" fill="#fff" /><line x1="50" y1="50" x2="50" y2="15" stroke="#fff" stroke-width="1"/></g>
        </svg>
    </div>
    <div class="grid">
        <div class="stat-box"><div class="label">True Azimuth</div><div class="val" id="az-read">000°</div></div>
        <div class="stat-box"><div class="label">Tilt Angle</div><div class="val" id="tilt-read">0.0°</div></div>
        <div class="stat-box"><div class="label">Sun Target</div><div class="val" id="sun-read">---°</div></div>
        <div class="stat-box"><div class="label">GPS Lock</div><div class="val" id="gps-read" style="color:var(--muted); font-size:12px;">WAITING</div></div>
    </div>
    <div class="slider-card">
        <div style="display:flex; justify-content:space-between">
            <span class="label">System Watts</span>
            <span id="w-val" style="color:var(--gold); font-weight:bold;">800W</span>
        </div>
        <input type="range" id="w-slider" min="100" max="5000" step="50" value="800">
    </div>
    <button class="btn" onclick="logData()">Record Reading</button>
</main>

<script>
    let state = { heading: 0, tilt: 0, watts: 800, sunAz: 180, lat: null, lng: null };
    let audioCtx;

    // Minified SunCalc logic for standalone offline functionality
    const PI=Math.PI,sin=Math.sin,cos=Math.cos,tan=Math.tan,asin=Math.asin,atan=Math.atan2,rad=PI/180,dayMs=86400000,J1970=2440588,J2000=2451545,e=rad*23.4397;
    function toDays(date){return date.valueOf()/dayMs-0.5+J1970-J2000;}
    function rightAscension(l,b){return atan(sin(l)*cos(e)-tan(b)*sin(e),cos(l));}
    function declination(l,b){return asin(sin(b)*cos(e)+cos(b)*sin(e)*sin(l));}
    function azimuth(H,phi,dec){return atan(sin(H),cos(H)*sin(phi)-tan(dec)*cos(phi));}
    function siderealTime(d,lw){return rad*(280.16+360.9856235*d)-lw;}
    function solarMeanAnomaly(d){return rad*(357.5291+0.98560028*d);}
    function eclipticLongitude(M){return M+rad*(1.9148*sin(M)+0.02*sin(2*M)+0.0003*sin(3*M))+rad*102.9372+PI;}
    function getSunPosition(date,lat,lng){
        const lw=rad*-lng,phi=rad*lat,d=toDays(date),M=solarMeanAnomaly(d),L=eclipticLongitude(M),dec=declination(L,0),ra=rightAscension(L,0),H=siderealTime(d,lw)-ra;
        return (azimuth(H,phi,dec)*180/PI+180)%360; 
    }

    document.getElementById('start-sys').onclick = async function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') initSensors();
        } else {
            initSensors();
        }
        document.getElementById('boot-screen').style.display = 'none';
        document.getElementById('sys-status').innerText = 'SYS_LIVE';
        ping(880);
    }

    function initSensors() {
        // FIXED: Android absolute orientation fallback
        const orientHandler = (e) => {
            if (e.webkitCompassHeading) {
                state.heading = e.webkitCompassHeading;
            } else if (e.absolute && e.alpha !== null) {
                state.heading = 360 - e.alpha; 
            } else {
                state.heading = 360 - e.alpha; 
            }
            state.tilt = Math.abs(e.beta || 0);
            updateUI();
        };

        if ('ondeviceorientationabsolute' in window) {
            window.addEventListener('deviceorientationabsolute', orientHandler);
        } else {
            window.addEventListener('deviceorientation', orientHandler);
        }

        // FIXED: Live GPS Tracking for Sun Azimuth
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                state.lat = pos.coords.latitude;
                state.lng = pos.coords.longitude;
                document.getElementById('gps-read').innerText = "ACTIVE";
                document.getElementById('gps-read').style.color = "var(--gold)";
                
                // Calculate live sun position
                state.sunAz = getSunPosition(new Date(), state.lat, state.lng);
                document.getElementById('sun-read').innerText = Math.round(state.sunAz) + '°';
                updateUI();
            }, (err) => {
                document.getElementById('gps-read').innerText = "DENIED";
                document.getElementById('gps-read').style.color = "var(--warn)";
            }, { enableHighAccuracy: true });
        }
    }

    function ping(f) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f;
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
        o.start(); o.stop(audioCtx.currentTime + 0.1);
    }

    function updateUI() {
        document.getElementById('phoneNeedle').style.transform = `rotate(${state.heading}deg)`;
        document.getElementById('sunNeedle').style.transform = `rotate(${state.sunAz}deg)`;
        document.getElementById('az-read').innerText = Math.round(state.heading).toString().padStart(3,'0') + '°';
        document.getElementById('tilt-read').innerText = state.tilt.toFixed(1) + '°';
    }

    document.getElementById('w-slider').oninput = (e) => {
        state.watts = e.target.value;
        document.getElementById('w-val').innerText = state.watts + 'W';
    }

    function logData() {
        ping(440);
        // iOS gracefully ignores vibrate, Android provides haptic feedback
        if ('vibrate' in navigator) navigator.vibrate(100);
        alert('READING_STORED: ' + Math.round(state.heading) + '° AZ, ' + state.tilt.toFixed(1) + '° TILT');
    }
</script>
</body>
</html>
