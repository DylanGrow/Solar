<style>
:root {
  --gold: #FFB612;
  --black: #000000;
  --dark: #0a0a0a;
  --gray: #1a1a1a;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--black);
  color: var(--gold);
  font-family: 'Courier New', Courier, monospace;
  line-height:1;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
}
#boot-screen {
  position:fixed; inset:0; z-index:1000;
  background: radial-gradient(ellipse at center, #0a0a0a 0%, #000 70%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;
}
.boot-title {
  font-size:24px; letter-spacing:4px; font-weight:700;
  text-shadow: 0 0 20px rgba(255,182,18,0.8), 0 0 40px rgba(255,182,18,0.4);
}
.boot-sub { font-size:11px; opacity:0.6; letter-spacing:2px; }
#start-sys {
  background:transparent; border:2px solid var(--gold); color:var(--gold);
  padding:18px 36px; font-family:inherit; font-size:15px; letter-spacing:3px; cursor:pointer;
  box-shadow: 0 0 20px rgba(255,182,18,0.3), inset 0 0 20px rgba(255,182,18,0.08);
  transition: all 0.15s;
}
#start-sys:active { transform:scale(0.96); background:rgba(255,182,18,0.1); }

.header {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px; border-bottom:1px solid var(--gold); background:var(--dark);
  box-shadow: 0 2px 10px rgba(255,182,18,0.1);
}
.logo { font-size:13px; letter-spacing:2px; }
#sys-status {
  font-size:10px; padding:5px 10px; border:1px solid var(--gold);
  background:rgba(255,182,18,0.08); letter-spacing:1px;
}

.main {
  height:calc(100vh - 49px); display:flex; flex-direction:column; align-items:center;
  padding:18px 16px; gap:18px; overflow-y:auto;
}
.compass-wrap { position:relative; width:min(86vw, 320px); height:min(86vw, 320px); flex-shrink:0; }
.compass-svg { width:100%; height:100%; overflow:visible; filter: drop-shadow(0 0 15px rgba(255,182,18,0.15)); }
.compass-ring { fill:none; stroke:var(--gold); stroke-width:1.5; opacity:0.25; }
.compass-tick { stroke:var(--gold); stroke-width:2; }
.compass-tick-minor { stroke:var(--gold); stroke-width:1; opacity:0.4; }
.compass-label { fill:var(--gold); font-size:16px; font-family:inherit; text-anchor:middle; dominant-baseline:middle; opacity:0.9; }
.needle { transform-origin:50% 50%; transition:transform 0.18s linear; }
#sunNeedle { filter: drop-shadow(0 0 10px var(--gold)); }
#phoneNeedle { opacity:0.75; }

.stats-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:420px;
}
.stat {
  background:linear-gradient(180deg, var(--gray), #0f0f0f);
  border:1px solid var(--gold); padding:10px 12px; position:relative; overflow:hidden;
}
.stat::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent); opacity:0.5;
}
.stat-label { font-size:9px; opacity:0.6; margin-bottom:6px; letter-spacing:1px; }
.stat-value { font-size:22px; letter-spacing:1px; text-shadow:0 0 8px rgba(255,182,18,0.4); }

.controls {
  width:100%; max-width:420px; background:var(--gray); border:1px solid var(--gold);
  padding:14px; box-shadow:inset 0 0 20px rgba(0,0,0,0.8);
}
.slider-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.slider-label { font-size:11px; min-width:66px; opacity:0.8; }
#w-slider { flex:1; -webkit-appearance:none; appearance:none; height:4px; background:#2a2a2a; outline:none; border:1px solid rgba(255,182,18,0.2); }
#w-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px; background:var(--gold);
  cursor:pointer; box-shadow:0 0 10px rgba(255,182,18,0.7); border:2px solid #000;
}
#w-slider::-moz-range-thumb {
  width:18px; height:18px; background:var(--gold); cursor:pointer; border:2px solid #000; border-radius:0;
}
#w-val { min-width:60px; text-align:right; font-size:15px; }
.output-row { display:flex; justify-content:space-between; align-items:center; padding-top:12px; margin-top:4px; border-top:1px solid rgba(255,182,18,0.2); font-size:12px; }
#out-val { font-size:20px; color:var(--gold); text-shadow:0 0 10px rgba(255,182,18,0.5); }

.btn-log {
  width:100%; margin-top:14px; background:transparent; border:1px solid var(--gold); color:var(--gold);
  padding:12px; font-family:inherit; font-size:12px; letter-spacing:2px; cursor:pointer;
  transition:all 0.15s;
}
.btn-log:active { background:rgba(255,182,18,0.12); transform:scale(0.99); }

.footer { font-size:9px; opacity:0.4; text-align:center; letter-spacing:1px; margin-top:4px; }

@media (max-height:720px) {
  .compass-wrap { width:min(70vw, 260px); height:min(70vw, 260px); }
  .stat-value { font-size:19px; }
  .main { gap:14px; padding:14px; }
}
</style>
</head>

<script>
const CONFIG = { DECLINATION: -8.7 };
const STATE = { lat:null, lng:null, sunAz:180, sunAlt:45, phoneAz:0, tilt:0, diff:180, watts:1200 };
let audioCtx = null, wakeLock = null, lastPing = 0, sunInterval = null;

function $(id){ return document.getElementById(id); }

function toDays(date){ return (date.getTime() / 86400000) - 10957.5; }
function getSunPosition(date, lat, lng){
  const rad = Math.PI/180;
  const d = toDays(date);
  const M = rad * (357.5291 + 0.98560028 * d);
  const L = M + rad * (1.9148*Math.sin(M) + 0.02*Math.sin(2*M) + 0.0003*Math.sin(3*M)) + rad*282.634;
  const dec = Math.asin(Math.sin(L) * Math.sin(rad*23.4397));
  const ra = Math.atan2(Math.cos(rad*23.4397)*Math.sin(L), Math.cos(L));
  const sid = rad * (280.46061837 + 360.98564736629 * d);
  const H = sid - lng*rad - ra;
  const phi = lat * rad;
  const az = Math.atan2(Math.sin(H), Math.cos(H)*Math.sin(phi) - Math.tan(dec)*Math.cos(phi));
  const alt = Math.asin(Math.sin(phi)*Math.sin(dec) + Math.cos(phi)*Math.cos(dec)*Math.cos(H));
  return { azimuth: (az*180/Math.PI + 180) % 360, altitude: alt*180/Math.PI };
}

function updateSun(){
  if(STATE.lat===null) return;
  const pos = getSunPosition(new Date(), STATE.lat, STATE.lng);
  STATE.sunAz = pos.azimuth;
  STATE.sunAlt = pos.altitude;
  $('sunNeedle').style.transform = `rotate(${STATE.sunAz}deg)`;
  updateOutput();
}

function ping(freq=1320, dur=0.07, vol=0.18){
  if(!audioCtx) return;
  if(audioCtx.state === 'suspended'){ audioCtx.resume().catch(()=>{}); }
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'square'; o.frequency.value = freq;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.start(); o.stop(audioCtx.currentTime + dur + 0.01);
}

async function requestWakeLock(){
  try { if('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch(e){}
}

function handleOrientation(e){
  let heading;
  const isIOS = e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null;
  if(isIOS){
    heading = e.webkitCompassHeading + CONFIG.DECLINATION;
  } else if(e.alpha !== null){
    heading = 360 - e.alpha;
  } else return;
  heading = (heading + 360) % 360;
  STATE.phoneAz = heading;
  $('phoneNeedle').style.transform = `rotate(${heading}deg)`;
  $('az-read').textContent = Math.round(heading) + '°';
  
  let tilt = Math.abs(e.beta || 0);
  tilt = Math.min(90, Math.max(0, tilt));
  STATE.tilt = tilt;
  $('tilt-read').textContent = Math.round(tilt) + '°';
  
  const diffRaw = Math.abs(STATE.phoneAz - STATE.sunAz);
  const diff = diffRaw > 180 ? 360 - diffRaw : diffRaw;
  STATE.diff = diff;
  $('diff-read').textContent = Math.round(diff) + '°';
  
  if(diff < 3){
    $('diff-read').style.textShadow = '0 0 12px #FFB612';
    const now = Date.now();
    if(diff < 1){
      // perfect alignment - fast double beep
      if(now - lastPing > 280){ 
        ping(1650, 0.05, 0.28); 
        setTimeout(()=>ping(1650,0.05,0.28), 90);
        if(navigator.vibrate) navigator.vibrate([15,30,15]); 
        lastPing = now; 
      }
    } else {
      // good alignment - steady beep
      if(now - lastPing > 520){ 
        ping(1320, 0.06, 0.22); 
        if(navigator.vibrate) navigator.vibrate(14); 
        lastPing = now; 
      }
    }
  } else {
    $('diff-read').style.textShadow = '';
  }
  updateOutput();
}

function updateOutput(){
  const rad = Math.PI/180;
  const tiltRad = STATE.tilt * rad;
  const sunAltRad = STATE.sunAlt * rad;
  const azDiffRad = STATE.diff * rad;
  // original spherical trig - cos(AOI) = sin(alt)*cos(tilt) + cos(alt)*sin(tilt)*cos(azDiff)
  const cosAOI = Math.sin(sunAltRad) * Math.cos(tiltRad) + Math.cos(sunAltRad) * Math.sin(tiltRad) * Math.cos(azDiffRad);
  const eff = Math.max(0, cosAOI);
  const outW = STATE.watts * eff;
  $('out-val').textContent = (outW >= 1000 ? (outW/1000).toFixed(2) + ' kW' : Math.round(outW) + ' W');
}

function initSensors(){
  requestWakeLock();
  if(navigator.geolocation){
    navigator.geolocation.watchPosition(pos=>{
      STATE.lat = pos.coords.latitude;
      STATE.lng = pos.coords.longitude;
      localStorage.setItem('fluxLat', STATE.lat);
      localStorage.setItem('fluxLng', STATE.lng);
      $('gps-read').textContent = STATE.lat.toFixed(3) + ',' + STATE.lng.toFixed(3);
      updateSun();
    }, ()=>{ $('gps-read').textContent = 'NO GPS'; }, {enableHighAccuracy:true, maximumAge:8000, timeout:15000});
  }
  window.addEventListener('deviceorientation', handleOrientation, true);
}

function logData(){
  const rec = {
    ts: new Date().toISOString(),
    lat: STATE.lat,
    lng: STATE.lng,
    az: Math.round(STATE.phoneAz),
    tilt: Math.round(STATE.tilt),
    sunAz: Math.round(STATE.sunAz),
    sunAlt: Math.round(STATE.sunAlt),
    diff: Math.round(STATE.diff),
    watts: STATE.watts,
    output: $('out-val').textContent
  };
  const logs = JSON.parse(localStorage.getItem('fluxLogs') || '[]');
  logs.push(rec);
  while(logs.length > 200) logs.shift();
  localStorage.setItem('fluxLogs', JSON.stringify(logs));
  const btn = $('log-btn');
  const old = btn.textContent;
  btn.textContent = 'LOGGED ✓';
  btn.style.background = 'rgba(255,182,18,0.18)';
  setTimeout(()=>{ btn.textContent = old; btn.style.background = ''; }, 1200);
  if(navigator.vibrate) navigator.vibrate([8,20,8]);
}

function exportCSV(){
  const logs = JSON.parse(localStorage.getItem('fluxLogs') || '[]');
  if(!logs.length){ alert('No logs yet'); return; }
  let csv = 'timestamp,lat,lng,azimuth,tilt,sunAz,sunAlt,diff,watts,output\n';
  logs.forEach(r => {
    csv += `${r.ts},${r.lat||''},${r.lng||''},${r.az},${r.tilt},${r.sunAz},${r.sunAlt},${r.diff},${r.watts},${r.output}\n`;
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `flux_logs_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  ping(1800, 0.08, 0.3);
  if(navigator.vibrate) navigator.vibrate([20,40,20]);
}

document.addEventListener('DOMContentLoaded', ()=>{
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
  const svgNS = 'http://www.w3.org/2000/svg';
  const compass = $('compass');
  const sunN = $('sunNeedle');
  for(let deg=0; deg<360; deg+=5){
    const r = deg * Math.PI/180;
    const r1 = 150, r2 = (deg % 30 === 0) ? 134 : 143;
    const x1 = 160 + r1 * Math.sin(r), y1 = 160 - r1 * Math.cos(r);
    const x2 = 160 + r2 * Math.sin(r), y2 = 160 - r2 * Math.cos(r);
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('class', deg % 30 === 0 ? 'compass-tick' : 'compass-tick-minor');
    compass.insertBefore(line, sunN);
  }
  
  const warm = localStorage.getItem('fluxWarm') === '1';
  if(warm) $('start-sys').textContent = 'RESUME SENSORS';
  
  const w = localStorage.getItem('fluxWatts');
  if(w){ STATE.watts = parseInt(w); $('w-slider').value = w; $('w-val').textContent = w + 'W'; }
  
  const lat = localStorage.getItem('fluxLat');
  const lng = localStorage.getItem('fluxLng');
  if(lat && lng){
    STATE.lat = parseFloat(lat); STATE.lng = parseFloat(lng);
    $('gps-read').textContent = STATE.lat.toFixed(2) + ',' + STATE.lng.toFixed(2);
    updateSun();
  }
  updateOutput();
  
  $('w-slider').addEventListener('input', e=>{
    STATE.watts = parseInt(e.target.value);
    $('w-val').textContent = STATE.watts + 'W';
    localStorage.setItem('fluxWatts', STATE.watts);
    updateOutput();
  });

  // long-press LOG DATA to export CSV
  const logBtn = $('log-btn');
  let pressTimer;
  const startPress = ()=>{ pressTimer = setTimeout(exportCSV, 800); };
  const cancelPress = ()=>{ clearTimeout(pressTimer); };
  logBtn.addEventListener('touchstart', startPress);
  logBtn.addEventListener('touchend', cancelPress);
  logBtn.addEventListener('mousedown', startPress);
  logBtn.addEventListener('mouseup', cancelPress);
  logBtn.addEventListener('mouseleave', cancelPress);
});

$('start-sys').onclick = async ()=>{
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  try{ await audioCtx.resume(); }catch(e){}
  
  if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
    try{ await DeviceOrientationEvent.requestPermission(); }catch(e){}
  }
  
  initSensors();
  localStorage.setItem('fluxWarm', '1');
  $('boot-screen').style.display = 'none';
  $('sys-status').textContent = 'NC_LOCKED';
  updateSun();
  if(sunInterval) clearInterval(sunInterval);
  sunInterval = setInterval(updateSun, 30000);
  ping();
  if(navigator.vibrate) navigator.vibrate(20);
};

document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState === 'visible') requestWakeLock(); });
</script>
</body>
